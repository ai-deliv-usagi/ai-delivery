<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国うさぎ AI - OSパッチパネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* サイバーな背景とフォントの設定 */
        body {
            background-color: #0d1117; /* GitHubダーク風 */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji';
            color: #c9d1d9;
        }

        /* 共通のボタン基底クラス（リッチな装飾） */
        .btn-rich {
            position: relative;
            overflow: hidden;
            border-width: 1px;
            border-style: solid;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* クリック時のへこみ演出 */
        .btn-rich:active {
            transform: translateY(2px) scale(0.98);
        }

        /* サイバーなホバー時の光彩（共通） */
        .btn-rich::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s;
            z-index: -1;
        }
        .btn-rich:hover::before {
            left: 100%;
        }

        /* --- 【個別CSS】人格ごとのデザイン --- */

        /* 標準OS: エンジニア風ダークブルー */
        .btn-normal {
            background: linear-gradient(145deg, #1f2937, #111827); /* gray-800 to gray-900 */
            border-color: #4b5563; /* gray-600 */
            color: #60a5fa; /* blue-400 */
            text-shadow: 0 0 5px rgba(96, 165, 250, 0.5);
        }
        .btn-normal:hover {
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
        }

        /* 侍OS: 和風（和紙・黄金） */
        .btn-samurai {
            background: linear-gradient(145deg, #b8860b, #daa520); /* ダークゴールド to ゴールド */
            border-color: #8b4513; /* サドルブラウン */
            color: #000; /* 黒字 */
            font-weight: 800; /* さらに太く */
        }
        .btn-samurai:hover {
            border-color: #daa520;
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.5);
        }

        /* ギャルOS: ネオンピンク・グラデーション */
        .btn-gal {
            background: linear-gradient(45deg, #ff00cc, #ff66ff); /* ピンク */
            border-color: #ff85ff;
            color: white;
            text-shadow: 1px 1px 0 #ff0066, 0 0 10px rgba(255, 255, 255, 0.7);
        }
        .btn-gal:hover {
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.7);
            transform: scale(1.03); /* 少し大きく */
        }

        /* ネチネチ小姑OS: 嫌味なグレー */
        .btn-nechinechi {
            background: linear-gradient(145deg, #4b5563, #374151); /* gray-600 to gray-700 */
            border-color: #1f2937; /* gray-800 */
            color: #d1d5db; /* gray-300 */
        }
        .btn-nechinechi:hover {
            background: linear-gradient(145deg, #374151, #4b5563); /* グラデ反転 */
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.3);
        }
        /* ツンデレ: ツインテール風（？）なオレンジ・ピンク */
        .btn-tsundere {
            background: linear-gradient(145deg, #ff9966, #ff5e62);
            border-color: #ffcccc;
            color: white;
        }

        /* 熱血: 燃え上がる炎の赤 */
        .btn-nekketsu {
            background: linear-gradient(145deg, #ff416c, #ff4b2b);
            border-color: #ffd700;
            color: white;
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.4);
        }

        /* 虚無: 宇宙の深淵のようなパープル・ネイビー */
        .btn-kyomu {
            background: linear-gradient(145deg, #2c3e50, #000000);
            border-color: #4a4e69;
            color: #9ca3af;
        }

        /* ハッカー: マトリックス風グリーン */
        .btn-hacker {
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px #00ff00;
        }
        .btn-hacker:hover {
            box-shadow: 0 0 15px #00ff00;
        }
        /* 猫OS: 三毛猫（白・オレンジ・黒）のドット柄イメージ */
        .btn-neko {
            background: radial-gradient(circle at 20% 20%, #ff9800 20%, transparent 20%),
                        radial-gradient(circle at 80% 80%, #333 20%, transparent 20%),
                        #fff;
            border: 3px solid #ffb74d;
            color: #5d4037;
            font-weight: 900;
            position: relative;
        }

        /* ホバー時に肉球が出るような演出（気分だけ） */
        .btn-neko:hover {
            background-color: #fff9f0;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.4);
        }
    </style>
</head>
<body class="p-5 select-none antialiased">
    <header class="mb-6 pb-3 border-b border-gray-700">
        <h1 class="text-2xl font-black text-center text-white tracking-tight">
            OS MANUAL <span class="text-blue-400">PATCH</span> PANEL
        </h1>
    </header>

    <div class="grid grid-cols-2 gap-5">
        {% for id, config in personalities.items() %}
        <button onclick="triggerJack('{{ id }}')" 
                class="btn-rich h-14 flex flex-col items-center justify-center p-4 rounded-xl shadow-2xl font-extrabold text-center group btn-{{ id }}">
            
            <span class="text-xl tracking-tight">{{ config.name }}</span>

            <div class="absolute bottom-2 right-2 w-3 h-3 bg-white/20 rounded-full group-hover:bg-white/90 transition-colors"></div>
        </button>
        {% endfor %}
    </div>

    <script>
        function triggerJack(modeId) {
            console.log("OSパッチ適用開始:", modeId);
            // パスにスラッシュを忘れない
            fetch('/api/force_jack/' + modeId)
                .then(response => {
                    if (response.ok) {
                        console.log("パッチ適用成功:", modeId);
                    } else {
                        console.error("サーバーエラー:", response.status);
                    }
                })
                .catch(error => {
                    console.error("ネットワークエラー:", error);
                });
        }
    </script>
</body>
</html>
